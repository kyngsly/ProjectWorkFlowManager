<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogIn/SignUp</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/form.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Project Board</h1>
        <h3 id="header_message">Continue with your email</h3>
      </div>

      <form action="" id="loginForm" class="form_container">
        <label for="">Email:</label>
        <input
          type="text"
          name="email"
          placeholder="Enter your email"
          id="email"
          required
          class="email_input"
        />
        <div id="passwordInput_element"></div>
        <p id="error_message"></p>
        <button type="submit" id="submit_btn" class="signUp_btn">
          Sign up
        </button>
      </form>
      <h4>Or continue with:</h4>
      <div class="button_wrapper">
        <button class="external_button">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.69 1.22 9.19 3.6l6.85-6.85C35.91 2.38 30.37 0 24 0 14.62 0 6.51 5.48 2.56 13.44l7.98 6.2C12.36 13.24 17.73 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.1 24.5c0-1.6-.14-3.13-.4-4.6H24v9.2h12.4c-.54 2.9-2.2 5.36-4.7 7.04l7.3 5.68C43.98 37.4 46.1 31.5 46.1 24.5z"
            />
            <path
              fill="#FBBC05"
              d="M10.54 28.64A14.5 14.5 0 0 1 9.5 24c0-1.62.28-3.18.77-4.64l-7.98-6.2A23.96 23.96 0 0 0 0 24c0 3.87.93 7.52 2.56 10.56l7.98-6.2z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.37 0 11.73-2.1 15.64-5.72l-7.3-5.68c-2.03 1.36-4.63 2.16-8.34 2.16-6.27 0-11.64-3.74-13.46-9.14l-7.98 6.2C6.51 42.52 14.62 48 24 48z"
            />
          </svg>
          Google
        </button>
        <button class="external_button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="black">
            <path
              d="M16.365 1.43c0 1.14-.47 2.23-1.23 3.05-.78.83-2.06 1.47-3.18 1.38-.14-1.12.41-2.3 1.19-3.13.78-.83 2.14-1.44 3.22-1.3zM21.2 17.04c-.62 1.44-.92 2.08-1.7 3.33-1.08 1.7-2.6 3.82-4.48 3.84-1.67.02-2.1-1.1-4.36-1.09-2.26.01-2.73 1.11-4.4 1.1-1.88-.02-3.32-1.93-4.4-3.62C.65 18.1-.55 14.6 1.14 11.6c1.2-2.15 3.36-3.51 5.36-3.53 1.67-.02 3.24 1.15 4.36 1.15 1.12 0 3.22-1.42 5.42-1.21.92.04 3.5.37 5.16 2.8-.13.08-3.08 1.8-3.04 5.37.04 4.28 3.76 5.71 3.8 5.73z"
            />
          </svg>
          Apple
        </button>
        <button class="external_button">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <rect x="1" y="1" width="10" height="10" fill="#F25022" />
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00" />
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF" />
            <rect x="13" y="13" width="10" height="10" fill="#FFB900" />
          </svg>
          Microsoft
        </button>
        <button class="external_button">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <rect x="10" y="1" width="4" height="8" fill="#36C5F0" />
            <rect x="10" y="15" width="4" height="8" fill="#2EB67D" />
            <rect x="1" y="10" width="8" height="4" fill="#ECB22E" />
            <rect x="15" y="10" width="8" height="4" fill="#E01E5A" />
          </svg>
          Slack
        </button>
      </div>
      <p>
        Already have an account?
        <a href="#">Log in</a>
      </p>
    </div>
    <script src="/JS/form.js"></script>
  </body>
</html>
